<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Trend Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            xblue: '#1d9bf0',
            xdark: '#15202b',
            xdarker: '#0d1520',
          }
        }
      }
    };
    // Apply dark mode based on system preference
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      document.documentElement.classList.toggle('dark', e.matches);
    });
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .tab-active { background-color: #1d9bf0; color: #fff; }
    .spinner { border: 3px solid rgba(29,155,240,0.2); border-top-color: #1d9bf0; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-white dark:bg-xdark text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="border-b border-gray-200 dark:border-gray-700 px-4 py-6 sm:px-6">
    <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
      <div class="min-w-0">
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">
          <span class="text-xblue">X</span> Trend Monitor
        </h1>
        <p id="last-updated" class="text-sm text-gray-500 dark:text-gray-400 mt-1">読み込み中...</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="refresh-btn" type="button" title="データを再取得"
          class="px-3 py-2 rounded-full text-sm border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:border-xblue hover:text-xblue transition-colors flex items-center gap-1.5">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
          <span class="hidden sm:inline">更新</span>
        </button>
        <button id="settings-btn" type="button" title="設定"
          class="p-2 rounded-full text-gray-500 hover:text-xblue hover:bg-gray-100 dark:hover:bg-xdarker transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Controls -->
  <div class="border-b border-gray-200 dark:border-gray-700 px-4 sm:px-6 py-3">
    <div class="max-w-3xl mx-auto space-y-3">
      <!-- Period tabs -->
      <div id="period-tabs" class="flex gap-2 flex-wrap">
        <button data-period="daily" class="tab-active px-4 py-2 rounded-full text-sm font-medium border border-xblue transition-colors">
          直近1日
        </button>
        <button data-period="weekly" class="px-4 py-2 rounded-full text-sm font-medium border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:border-xblue hover:text-xblue transition-colors">
          直近7日
        </button>
        <button data-period="monthly" class="px-4 py-2 rounded-full text-sm font-medium border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:border-xblue hover:text-xblue transition-colors">
          直近30日
        </button>
        <button data-period="favorites" class="px-4 py-2 rounded-full text-sm font-medium border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:border-xblue hover:text-xblue transition-colors flex items-center gap-1.5">
          <span>★ お気に入り</span>
          <span id="fav-count" class="hidden text-[10px] bg-xblue text-white rounded-full px-1.5">0</span>
        </button>
      </div>

      <!-- Sort + filter row -->
      <div class="flex items-center gap-3 flex-wrap">
        <div class="flex items-center gap-2">
          <span class="text-sm text-gray-500 dark:text-gray-400">Sort:</span>
          <select id="sort-select" class="bg-gray-100 dark:bg-xdarker border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-xblue">
            <option value="by_views">再生数</option>
            <option value="by_bookmarks">保存数</option>
            <option value="by_engagement">総合スコア</option>
          </select>
        </div>
        <div class="flex items-center gap-2 flex-1 min-w-[180px]">
          <input
            id="filter-input"
            type="search"
            placeholder="キーワードで絞り込み（スペース区切りでAND検索）"
            class="flex-1 bg-gray-100 dark:bg-xdarker border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-xblue placeholder:text-gray-400"
          />
          <button id="filter-clear" type="button" class="hidden text-xs text-gray-500 hover:text-xblue">クリア</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Stats line -->
  <div class="px-4 sm:px-6 py-2">
    <div class="max-w-3xl mx-auto">
      <p id="stats-line" class="text-xs text-gray-400 dark:text-gray-500"></p>
    </div>
  </div>

  <!-- Tweet list -->
  <main class="flex-1 px-4 sm:px-6 pb-8">
    <div class="max-w-7xl mx-auto">
      <!-- Loading state -->
      <div id="loading-state" class="flex flex-col items-center justify-center py-20">
        <div class="spinner"></div>
        <p class="mt-4 text-sm text-gray-400">データを読み込み中...</p>
      </div>
      <!-- Error state (hidden by default) -->
      <div id="error-state" class="hidden flex flex-col items-center justify-center py-20">
        <p class="text-red-500 text-lg">&#x26A0; データの読み込みに失敗しました</p>
        <p id="error-message" class="text-sm text-gray-400 mt-2"></p>
        <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-xblue text-white rounded-full text-sm hover:opacity-90 transition-opacity">再読み込み</button>
      </div>
      <!-- Grid -->
      <div id="tweet-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"></div>
    </div>
  </main>

  <!-- Settings modal -->
  <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-xdarker text-gray-900 dark:text-gray-100 rounded-xl shadow-2xl max-w-md w-full p-6 relative">
      <button id="settings-close" type="button" aria-label="閉じる"
        class="absolute top-3 right-3 w-8 h-8 rounded-full hover:bg-gray-100 dark:hover:bg-xdark text-gray-500 text-xl flex items-center justify-center">&times;</button>
      <h2 class="text-lg font-bold mb-4">設定</h2>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1.5">GitHub Personal Access Token</label>
          <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">「更新」ボタンで GitHub Actions を起動するために必要です。<code class="bg-gray-100 dark:bg-xdark px-1 py-0.5 rounded text-[11px]">workflow</code> スコープの fine-grained / classic PAT を作成してください。<br>
            <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener" class="text-xblue underline">GitHub で PAT を作成 ↗</a>
          </p>
          <input id="pat-input" type="password" placeholder="github_pat_..." autocomplete="off"
            class="w-full bg-gray-100 dark:bg-xdark border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-xblue" />
          <p class="text-[11px] text-gray-400 mt-1">ブラウザの localStorage にのみ保存されます（送信先は GitHub のみ）</p>
        </div>

        <div class="flex items-center gap-2 pt-2">
          <button id="pat-save" type="button" class="px-4 py-2 bg-xblue text-white rounded-full text-sm hover:opacity-90">保存</button>
          <button id="pat-clear" type="button" class="px-3 py-2 text-sm text-gray-500 hover:text-red-500">削除</button>
          <span id="pat-status" class="ml-auto text-xs text-gray-500"></span>
        </div>

        <hr class="border-gray-200 dark:border-gray-700">

        <div>
          <h3 class="text-sm font-medium mb-2">お気に入りの管理</h3>
          <button id="fav-export" type="button" class="text-xs text-xblue hover:underline mr-3">エクスポート (JSON)</button>
          <button id="fav-clear" type="button" class="text-xs text-red-500 hover:underline">全削除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Refresh status toast -->
  <div id="refresh-toast" class="hidden fixed bottom-4 right-4 z-40 bg-xdark text-white rounded-lg shadow-2xl p-4 max-w-sm text-sm flex items-start gap-3">
    <div id="refresh-spinner" class="spinner flex-shrink-0" style="width:20px;height:20px;border-width:2px;"></div>
    <div class="flex-1 min-w-0">
      <p id="refresh-message" class="font-medium">データ取得を開始しました</p>
      <p id="refresh-detail" class="text-xs text-gray-400 mt-1"></p>
    </div>
    <button id="refresh-toast-close" type="button" aria-label="閉じる" class="text-gray-400 hover:text-white text-lg leading-none">&times;</button>
  </div>

  <!-- Video modal -->
  <div id="video-modal" class="hidden fixed inset-0 z-50 bg-black/85 flex items-center justify-center p-4">
    <button id="modal-close" type="button" aria-label="閉じる"
      class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 text-white text-2xl flex items-center justify-center">&times;</button>
    <div id="modal-content" class="max-w-5xl max-h-[90vh] w-full flex items-center justify-center"></div>
  </div>

  <!-- Footer -->
  <footer class="border-t border-gray-200 dark:border-gray-700 px-4 py-4 text-center">
    <p class="text-xs text-gray-400 dark:text-gray-500">Powered by NT Studio</p>
  </footer>

  <script src="https://platform.twitter.com/widgets.js" charset="utf-8" async></script>
  <script src="assets/app.js"></script>
</body>
</html>
