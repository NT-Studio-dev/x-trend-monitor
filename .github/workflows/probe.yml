name: Probe API

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe API
        env:
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
        run: node scripts/probe.js
